<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>SenSante - Pré-diagnostic</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">
                SenSante
            </h1>

            <p class="text-blue-100 text-sm">
                Assistant pré-diagnostic médical
            </p>
        </div>
    </header>

    <!-- Contenu principal -->
    <main class="max-w-4xl mx-auto px-4 py-8">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

           <!-- Colonne gauche : formulaire -->
<div
    id="form-section"
    class="bg-white rounded-xl shadow-md p-6"
>

    <h2 class="text-xl font-bold text-gray-800 mb-4">
        Symptômes du patient
    </h2>

    <!-- Âge -->
    <div class="mb-3">

        <label
            class="block text-sm font-medium text-gray-700 mb-1"
        >
            Âge
        </label>

        <input
            type="number"
            id="age"
            class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            placeholder="Ex : 28"
            min="0"
            max="120"
        />

    </div>

    <!-- Sexe -->
    <div class="mb-3">

        <label
            class="block text-sm font-medium text-gray-700 mb-1"
        >
            Sexe
        </label>

        <select
            id="sexe"
            class="w-full border border-gray-300 rounded-lg p-2"
        >
            <option value="F">Féminin</option>
            <option value="M">Masculin</option>
        </select>

    </div>

    <!-- Température -->
    <div class="mb-3">

        <label
            class="block text-sm font-medium text-gray-700 mb-1"
        >
            Température (°C)
        </label>

        <input
            type="number"
            id="temperature"
            step="0.1"
            class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            placeholder="Ex : 38.5"
            min="35"
            max="42"
        />

    </div>

    <!-- Tension -->
    <div class="mb-3">

        <label
            class="block text-sm font-medium text-gray-700 mb-1"
        >
            Tension systolique
        </label>

        <input
            type="number"
            id="tension_sys"
            class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none"
            placeholder="Ex : 120"
            min="60"
            max="250"
        />

    </div>

    <!-- Symptômes -->
    <div class="mb-3">

        <label
            class="block text-sm font-medium text-gray-700 mb-2"
        >
            Symptômes
        </label>

        <div class="space-y-2">

            <label class="flex items-center">
                <input
                    type="checkbox"
                    id="toux"
                    class="rounded text-blue-600 mr-2"
                />
                <span class="text-gray-700">Toux</span>
            </label>

            <label class="flex items-center">
                <input
                    type="checkbox"
                    id="fatigue"
                    class="rounded text-blue-600 mr-2"
                />
                <span class="text-gray-700">Fatigue</span>
            </label>

            <label class="flex items-center">
                <input
                    type="checkbox"
                    id="maux_tete"
                    class="rounded text-blue-600 mr-2"
                />
                <span class="text-gray-700">Maux de tête</span>
            </label>

        </div>

    </div>

    <!-- Région -->
    <div class="mb-4">

        <label
            class="block text-sm font-medium text-gray-700 mb-1"
        >
            Région
        </label>

        <select
            id="region"
            class="w-full border border-gray-300 rounded-lg p-2"
        >
            <option value="Dakar">Dakar</option>
            <option value="Thies">Thiès</option>
            <option value="Saint-Louis">Saint-Louis</option>
            <option value="Ziguinchor">Ziguinchor</option>
            <option value="Tambacounda">Tambacounda</option>
            <option value="Kaolack">Kaolack</option>
            <option value="Diourbel">Diourbel</option>
            <option value="Fatick">Fatick</option>
            <option value="Kolda">Kolda</option>
            <option value="Matam">Matam</option>
        </select>

    </div>

    <!-- Bouton -->
    <button
        onclick="diagnostiquer()"
        id="btn-diag"
        class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md"
    >
        Diagnostiquer
    </button>

</div>

            <!-- Colonne droite : résultat -->
            <div id="result-section">
                <!-- À remplir dans l'étape 5 -->
            </div>

        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center text-gray-400 text-sm py-4">
        SenSante v0.3 - ESP/UCAD - L2 GLSI 2026
    </footer>

    <!-- JavaScript -->
    <script>
        // À remplir dans l'étape 4
        // URL de l'API (à changer si l'API est ailleurs)
const API_URL = "http://localhost:8000";

async function diagnostiquer() {

    // 1. Récupérer les valeurs du formulaire
    const patient = {

        age: parseInt(
            document.getElementById("age").value
        ),

        sexe: document.getElementById("sexe").value,

        temperature: parseFloat(
            document.getElementById("temperature").value
        ),

        tension_sys: parseInt(
            document.getElementById("tension_sys").value
        ),

        toux: document.getElementById("toux").checked,

        fatigue: document.getElementById("fatigue").checked,

        maux_tete: document.getElementById("maux_tete").checked,

        region: document.getElementById("region").value

    };

    // 2. Vérifier les champs obligatoires
    if (
        !patient.age ||
        !patient.temperature ||
        !patient.tension_sys
    ) {

        afficherErreur(
            "Veuillez remplir tous les champs."
        );

        return;
    }

    // 3. Afficher le spinner de chargement
    afficherChargement();

    try {

        // 4. Envoyer la requête à l'API
        const response = await fetch(
            API_URL + "/predict",
            {
                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(patient)
            }
        );

        // 5. Vérifier la réponse
        if (!response.ok) {

            const err = await response.json();

            throw new Error(
                err.detail
                    ? JSON.stringify(err.detail)
                    : "Erreur serveur"
            );

        }

        // 6. Lire le résultat
        const resultat = await response.json();

        // 7. Afficher le résultat
        afficherResultat(resultat);

    } catch (error) {

        afficherErreur(
            "Erreur de connexion : " + error.message
        );

    }

}
    </script>

</body>

</html>
